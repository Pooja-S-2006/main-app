<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Premium Luxury E-Commerce</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            pointer-events: none;
            z-index: 1;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        .navbar {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.95));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 120px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .brand {
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-menu {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .nav-dropdown {
            position: relative;
        }
        .nav-dropdown-content {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            min-width: 200px;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }
        .nav-item {
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            display: block;
            text-decoration: none;
            font-size: 14px;
        }
        .nav-item:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateX(5px);
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-btn {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a2e;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .nav-btn:hover::before {
            left: 100%;
        }
        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        .cart-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            position: relative;
        }
        .cart-btn:hover {
            background: linear-gradient(135deg, #ff8787, #f06229);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        .cart-count {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 10px rgba(220, 38, 38, 0.5);
        }
        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 16px;
            width: 300px;
            transition: all 0.3s;
        }
        .search-bar:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }
        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .filter-section {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .filter-title {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .filter-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .filter-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            transform: translateY(-2px);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-color: #ffd700;
            color: #1a1a2e;
            font-weight: 600;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .product-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(22, 33, 62, 0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #ffd700);
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
        }
        .product-card:hover::before {
            opacity: 0.1;
        }
        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 120px rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }
        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .product-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(45deg, #2d3748, #1a202c);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid rgba(255, 215, 0, 0.1);
        }
        .product-image::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }
        .product-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .product-price {
            font-size: 28px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .product-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .add-to-cart {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a2e;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .add-to-cart::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .add-to-cart:hover::before {
            left: 100%;
        }
        .add-to-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        .success-message {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
            animation: slideIn 0.6s ease-out;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .cart-page {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.95));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-top: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            gap: 25px;
            transition: all 0.3s;
        }
        .cart-item:hover {
            background: rgba(255, 215, 0, 0.05);
        }
        .cart-item-image {
            font-size: 48px;
            background: linear-gradient(45deg, #2d3748, #1a202c);
            padding: 20px;
            border-radius: 15px;
            min-width: 80px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            font-size: 18px;
        }
        .cart-item-price {
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .quantity-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        .quantity-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }
        .quantity-input {
            width: 60px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
        }
        .cart-summary {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 215, 0, 0.3);
        }
        .cart-total {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-align: right;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .checkout-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .checkout-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }
        .checkout-btn:hover::before {
            left: 100%;
        }
        .checkout-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
        }
        .empty-cart {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
        }
        .remove-btn {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
            border: 1px solid rgba(220, 38, 38, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .remove-btn:hover {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 5px 20px rgba(220, 38, 38, 0.3);
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .page-title {
            color: #fff;
            text-align: center;
            margin-bottom: 40px;
            font-size: 42px;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.5);
            font-weight: 300;
            letter-spacing: 3px;
        }
        .back-btn {
            background: linear-gradient(135deg, #6b7280, #4c566a);
            color: white;
            border: 1px solid rgba(107, 114, 128, 0.3);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 15px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: linear-gradient(135deg, #7c8a99, #5a6772);
            box-shadow: 0 5px 20px rgba(107, 114, 128, 0.3);
        }
        .order-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin-top: 40px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.3);
        }
        .order-success h2 {
            margin-bottom: 25px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .order-details {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin-top: 25px;
            text-align: left;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .hero-section {
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 40px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .hero-title {
            font-size: 48px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }
        .hero-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        .auth-page {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.95));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 60px;
            margin-top: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .auth-title {
            font-size: 36px;
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-label {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        .form-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .auth-btn {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a2e;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 18px 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .auth-btn:hover::before {
            left: 100%;
        }
        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        .auth-switch {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.8);
        }
        .auth-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .auth-link:hover {
            color: #ffed4e;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .about-page {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(22, 33, 62, 0.95));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 60px;
            margin-top: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .about-title {
            font-size: 42px;
            color: #ffd700;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .about-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .about-section {
            margin-bottom: 40px;
        }
        .about-section h3 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .about-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }
        .feature-card:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        .feature-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .feature-title {
            color: #ffd700;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .feature-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const products = [
            { id: 1, name: "Premium Laptop Pro", price: 207499.17, category: "Electronics", image: "https://picsum.photos/seed/laptop/400/300", description: "Ultra-high-performance laptop with 32GB RAM, 1TB SSD, RTX 4080 graphics", badge: "Premium" },
            { id: 2, name: "Luxury Wireless Headphones", price: 49799.17, category: "Electronics", image: "https://picsum.photos/seed/headphones/400/300", description: "Premium noise-cancelling headphones with 50-hour battery and leather cushions", badge: "Luxury" },
            { id: 3, name: "Elite Smart Watch", price: 74699.17, category: "Electronics", image: "https://picsum.photos/seed/watch/400/300", description: "Premium fitness tracking with health monitoring and sapphire glass", badge: "Elite" },
            { id: 4, name: "Professional Running Shoes", price: 24899.17, category: "Sports", image: "https://picsum.photos/seed/shoes/400/300", description: "Professional athletic shoes with advanced cushioning and carbon fiber sole", badge: "Pro" },
            { id: 5, name: "Premium Yoga Mat", price: 12449.17, category: "Sports", image: "https://picsum.photos/seed/yoga/400/300", description: "Eco-friendly cork yoga mat with alignment guides and carrying case", badge: "Premium" },
            { id: 6, name: "Artisan Coffee Maker", price: 33199.17, category: "Home", image: "https://picsum.photos/seed/coffee/400/300", description: "Handcrafted Italian coffee maker with temperature control and grinder", badge: "Artisan" },
            { id: 7, name: "Designer Desk Lamp", price: 24899.17, category: "Home", image: "https://picsum.photos/seed/lamp/400/300", description: "Minimalist designer lamp with wireless charging and smart controls", badge: "Designer" },
            { id: 8, name: "Luxury Backpack", price: 16599.17, category: "Accessories", image: "https://picsum.photos/seed/backpack/400/300", description: "Genuine leather backpack with laptop compartment and USB charging", badge: "Luxury" },
            { id: 9, name: "4K Webcam Pro", price: 37349.17, category: "Electronics", image: "https://picsum.photos/seed/webcam/400/300", description: "Professional 4K webcam with auto-focus and ring light", badge: "Pro" },
            { id: 10, name: "Gaming Keyboard RGB", price: 14939.17, category: "Electronics", image: "https://picsum.photos/seed/keyboard/400/300", description: "Mechanical gaming keyboard with customizable RGB lighting", badge: "Gaming" },
            { id: 11, name: "Smart Home Hub", price: 66399.17, category: "Home", image: "https://picsum.photos/seed/smarthome/400/300", description: "AI-powered home automation hub with voice control", badge: "Smart" },
            { id: 12, name: "Fitness Tracker Pro", price: 29049.17, category: "Sports", image: "https://picsum.photos/seed/fitness/400/300", description: "Advanced fitness tracker with GPS and heart rate monitoring", badge: "Pro" }
        ];
        
        const categories = ['All', 'Electronics', 'Sports', 'Home', 'Accessories'];
        
        const App = () => {
            const [cart, setCart] = useState([]);
            const [currentPage, setCurrentPage] = useState('home');
            const [showSuccess, setShowSuccess] = useState(false);
            const [orderPlaced, setOrderPlaced] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [priceRange, setPriceRange] = useState('all');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [formData, setFormData] = useState({ email: '', password: '', name: '' });
            
            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                if (existingItem) {
                    updateQuantity(existingItem.cartId, existingItem.quantity + 1);
                } else {
                    setCart([...cart, { ...product, quantity: 1, cartId: Date.now() }]);
                }
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 3000);
            };
            
            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };
            
            const updateQuantity = (cartId, newQuantity) => {
                if (newQuantity <= 0) {
                    removeFromCart(cartId);
                } else {
                    setCart(cart.map(item =>
                        item.cartId === cartId ? { ...item, quantity: newQuantity } : item
                    ));
                }
            };
            
            const getCartCount = () => {
                return cart.reduce((total, item) => total + item.quantity, 0);
            };
            
            const getCartTotal = () => {
                return cart.reduce((total, item) => total + (item.price * item.quantity), 0).toFixed(2);
            };
            
            const placeOrder = () => {
                setOrderPlaced(true);
                setTimeout(() => {
                    setCart([]);
                    setOrderPlaced(false);
                    setCurrentPage('home');
                }, 4000);
            };
            
            const filteredProducts = products.filter(product => {
                const matchesCategory = selectedCategory === 'All' || product.category === selectedCategory;
                const matchesSearch = searchTerm === '' || 
                                     product.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                     product.description.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesPrice = priceRange === 'all' || 
                                     (priceRange === 'under500' && product.price < 50000) ||
                                     (priceRange === '500to1000' && product.price >= 50000 && product.price <= 83000) ||
                                     (priceRange === 'over1000' && product.price > 83000);
                return matchesCategory && matchesSearch && matchesPrice;
            });
            
            const handleAuthSubmit = (e) => {
                e.preventDefault();
                setIsLoggedIn(true);
                setCurrentPage('home');
            };
            
            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };
            
            const HomePage = () => (
                <div>
                    <div className="hero-section">
                        <h1 className="hero-title">ShopHub Premium</h1>
                        <p className="hero-subtitle">Discover Luxury Products for Modern Lifestyle</p>
                    </div>
                    
                    <div className="filter-section">
                        <h3 className="filter-title">Browse Categories</h3>
                        <div className="filter-options">
                            {categories.map(category => (
                                <button
                                    key={category}
                                    className={`filter-btn ${selectedCategory === category ? 'active' : ''}`}
                                    onClick={() => setSelectedCategory(category)}
                                >
                                    {category === 'All' ? 'All' : 
                                     category === 'Electronics' ? 'Electronics' :
                                     category === 'Sports' ? 'Sports' :
                                     category === 'Home' ? 'Home' : 'Accessories'}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="filter-section">
                        <h3 className="filter-title">Price Range</h3>
                        <div className="filter-options">
                            <button
                                className={`filter-btn ${priceRange === 'all' ? 'active' : ''}`}
                                onClick={() => setPriceRange('all')}
                            >
                                All Prices
                            </button>
                            <button
                                className={`filter-btn ${priceRange === 'under500' ? 'active' : ''}`}
                                onClick={() => setPriceRange('under500')}
                            >
                                Under ₹50,000
                            </button>
                            <button
                                className={`filter-btn ${priceRange === '500to1000' ? 'active' : ''}`}
                                onClick={() => setPriceRange('500to1000')}
                            >
                                ₹50,000 - ₹83,000
                            </button>
                            <button
                                className={`filter-btn ${priceRange === 'over1000' ? 'active' : ''}`}
                                onClick={() => setPriceRange('over1000')}
                            >
                                Over ₹83,000
                            </button>
                        </div>
                    </div>
                    
                    {showSuccess && (
                        <div className="success-message">
                            Product added to cart successfully!
                        </div>
                    )}
                    
                    <div className="products-grid">
                        {filteredProducts.map(product => (
                            <div key={product.id} className="product-card">
                                {product.badge && (
                                    <div className="product-badge">{product.badge}</div>
                                )}
                                <div className="product-image" style={{ backgroundImage: `url(${product.image})` }}>
                                </div>
                                <div className="product-title">{product.name}</div>
                                <div className="product-price">₹{product.price}</div>
                                <div className="product-description">{product.description}</div>
                                <button 
                                    className="add-to-cart"
                                    onClick={() => addToCart(product)}
                                >
                                    Add to Cart
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
            
            const LoginPage = () => (
                <div className="auth-page">
                    <h2 className="auth-title">{authMode === 'login' ? 'Welcome Back' : 'Join ShopHub'}</h2>
                    <form className="auth-form" onSubmit={handleAuthSubmit}>
                        {authMode === 'signup' && (
                            <div className="form-group">
                                <label className="form-label">Full Name</label>
                                <input
                                    type="text"
                                    name="name"
                                    className="form-input"
                                    placeholder="Enter your full name"
                                    value={formData.name}
                                    onChange={handleInputChange}
                                    required
                                />
                            </div>
                        )}
                        <div className="form-group">
                            <label className="form-label">Email Address</label>
                            <input
                                type="email"
                                name="email"
                                className="form-input"
                                placeholder="Enter your email"
                                value={formData.email}
                                onChange={handleInputChange}
                                required
                            />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Password</label>
                            <input
                                type="password"
                                name="password"
                                className="form-input"
                                placeholder="Enter your password"
                                value={formData.password}
                                onChange={handleInputChange}
                                required
                            />
                        </div>
                        <button type="submit" className="auth-btn">
                            {authMode === 'login' ? 'Sign In' : 'Create Account'}
                        </button>
                    </form>
                    <div className="auth-switch">
                        {authMode === 'login' ? (
                            <p>Don't have an account? <a href="#" className="auth-link" onClick={(e) => { e.preventDefault(); setAuthMode('signup'); }}>Sign up</a></p>
                        ) : (
                            <p>Already have an account? <a href="#" className="auth-link" onClick={(e) => { e.preventDefault(); setAuthMode('login'); }}>Sign in</a></p>
                        )}
                    </div>
                </div>
            );
            
            const AboutPage = () => (
                <div className="about-page">
                    <h2 className="about-title">About ShopHub Premium</h2>
                    <div className="about-content">
                        <div className="about-section">
                            <h3>Our Story</h3>
                            <p>ShopHub Premium is your premier destination for luxury products and exceptional shopping experiences. Founded in 2024, we've curated the finest selection of premium electronics, sports equipment, home goods, and accessories for discerning customers who demand quality and excellence.</p>
                        </div>
                        
                        <div className="about-section">
                            <h3>Our Mission</h3>
                            <p>We believe that luxury should be accessible to everyone who appreciates quality. Our mission is to bridge the gap between premium products and sophisticated consumers, offering carefully selected items that combine innovation, style, and exceptional value.</p>
                        </div>
                        
                        <div className="about-section">
                            <h3>Why Choose ShopHub?</h3>
                            <div className="about-features">
                                <div className="feature-card">
                                    <div className="feature-icon">Premium Quality</div>
                                    <div className="feature-title">Premium Quality</div>
                                    <div className="feature-description">Every product is carefully selected for exceptional quality and durability</div>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">Fast Delivery</div>
                                    <div className="feature-title">Fast Delivery</div>
                                    <div className="feature-description">Express shipping with 2-3 business day delivery</div>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">Luxury Experience</div>
                                    <div className="feature-title">Luxury Experience</div>
                                    <div className="feature-description">Premium shopping experience with personalized service</div>
                                </div>
                                <div className="feature-card">
                                    <div className="feature-icon">Secure Shopping</div>
                                    <div className="feature-title">Secure Shopping</div>
                                    <div className="feature-description">Advanced security and fraud protection</div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="about-section">
                            <h3>Contact Us</h3>
                            <p>Have questions or need assistance? Our premium customer service team is here to help 24/7.</p>
                            <p>Email: premium@shophub.com | Phone: 1-800-SHOPHUB | Live Chat Available</p>
                        </div>
                    </div>
                </div>
            );
            
            const CartPage = () => (
                <div className="cart-page">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '30px' }}>
                        <button className="back-btn" onClick={() => setCurrentPage('home')}>
                            Back to Shopping
                        </button>
                        <h2 style={{ color: '#ffd700', margin: 0, textShadow: '0 2px 10px rgba(255, 215, 0, 0.3)' }}>Shopping Cart</h2>
                        <div style={{ color: 'white' }}>
                            Cart: {getCartCount()} items
                        </div>
                    </div>
                    
                    {cart.length === 0 ? (
                        <div className="empty-cart">
                            <h3>Your cart is empty</h3>
                            <p>Add some premium products to get started!</p>
                        </div>
                    ) : (
                        <div>
                            {cart.map(item => (
                                <div key={item.cartId} className="cart-item">
                                    <div className="cart-item-image" style={{ backgroundImage: `url(${item.image})` }}>
                                    </div>
                                    <div className="cart-item-details">
                                        <div className="cart-item-title">{item.name}</div>
                                        <div className="cart-item-price">₹{item.price}</div>
                                        <div className="quantity-controls">
                                            <button 
                                                className="quantity-btn"
                                                onClick={() => updateQuantity(item.cartId, item.quantity - 1)}
                                            >
                                                -
                                            </button>
                                            <input 
                                                type="number"
                                                className="quantity-input"
                                                value={item.quantity}
                                                onChange={(e) => updateQuantity(item.cartId, parseInt(e.target.value) || 1)}
                                                min="1"
                                            />
                                            <button 
                                                className="quantity-btn"
                                                onClick={() => updateQuantity(item.cartId, item.quantity + 1)}
                                            >
                                                +
                                            </button>
                                            <button 
                                                className="remove-btn"
                                                onClick={() => removeFromCart(item.cartId)}
                                            >
                                                Remove
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            
                            <div className="cart-summary">
                                <div className="cart-total">
                                    Total: ₹{getCartTotal()}
                                </div>
                                <button className="checkout-btn" onClick={placeOrder}>
                                    Place Order
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
            
            const OrderSuccess = () => (
                <div className="order-success">
                    <h2>Order Placed Successfully!</h2>
                    <p>Thank you for your premium purchase!</p>
                    <div className="order-details">
                        <h4>Order Summary:</h4>
                        <p>Items: {cart.length} products</p>
                        <p>Total: ₹{getCartTotal()}</p>
                        <p>Estimated delivery: 2-3 business days</p>
                        <p>Shipping: Free Express Shipping</p>
                    </div>
                    <button className="back-btn" onClick={() => setCurrentPage('home')}>
                        Continue Shopping
                    </button>
                </div>
            );
            
            return (
                <div className="container">
                    <nav className="navbar">
                        <div className="brand" onClick={() => setCurrentPage('home')}>
                            <span>ShopHub Premium</span>
                        </div>
                        <div className="nav-links">
                            <div className="nav-dropdown">
                                <button className="nav-btn" onClick={() => { setSelectedCategory('All'); setCurrentPage('home'); }}>
                                    Products
                                </button>
                                <div className="nav-dropdown-content">
                                    <a href="#" className="nav-item" onClick={(e) => { e.preventDefault(); setSelectedCategory('All'); }}>All Products</a>
                                    <a href="#" className="nav-item" onClick={(e) => { e.preventDefault(); setSelectedCategory('Electronics'); }}>Electronics</a>
                                    <a href="#" className="nav-item" onClick={(e) => { e.preventDefault(); setSelectedCategory('Sports'); }}>Sports</a>
                                    <a href="#" className="nav-item" onClick={(e) => { e.preventDefault(); setSelectedCategory('Home'); }}>Home & Living</a>
                                    <a href="#" className="nav-item" onClick={(e) => { e.preventDefault(); setSelectedCategory('Accessories'); }}>Accessories</a>
                                </div>
                            </div>
                            
                            {!isLoggedIn && (
                                <button className="nav-btn" onClick={() => setCurrentPage('login')}>
                                    Login
                                </button>
                            )}
                            
                            {isLoggedIn && (
                                <button className="nav-btn" onClick={() => setCurrentPage('about')}>
                                    About Us
                                </button>
                            )}
                            
                            <input 
                                type="text"
                                className="search-bar"
                                placeholder="Search premium products..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            
                            <button 
                                className="nav-btn cart-btn"
                                onClick={() => setCurrentPage('cart')}
                            >
                                Cart
                                {getCartCount() > 0 && (
                                    <span className="cart-count">{getCartCount()}</span>
                                )}
                            </button>
                        </div>
                    </nav>
                    
                    {orderPlaced ? (
                        <OrderSuccess />
                    ) : currentPage === 'home' ? (
                        <HomePage />
                    ) : currentPage === 'login' ? (
                        <LoginPage />
                    ) : currentPage === 'about' ? (
                        <AboutPage />
                    ) : (
                        <CartPage />
                    )}
                </div>
            );
        };
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
