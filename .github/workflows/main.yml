name: Submodule Integration Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force Fix and Sync Submodules
        run: |
          # This line removes the 'ghost' reference that is causing the crash
          git rm --cached auth-module-auth || true
          
          # Now sync and update the submodules that actually exist
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Check Submodule Status
        run: |
          echo "Current Submodule Integration:"
          git submodule status

      - name: Verify Submodule Content
        run: |
          echo "Listing repository structure:"
          ls -R
